  <path d="M274 310 L302 310 L302 325 L287 325" fill="none" stroke="#c8f135" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <circle cx="285" cy="325" r="5" fill="#c8f135" opacity="0.9"/>

  <!-- Center pulse dot -->
  <circle cx="256" cy="256" r="8" fill="#c8f135"/>
