  <path d="M238 270 L205 270 L205 285" fill="none" stroke="#c8f135" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <circle cx="205" cy="287" r="5" fill="#c8f135" opacity="0.9"/>
  
  <path d="M238 310 L210 310 L210 325 L225 325" fill="none" stroke="#c8f135" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <circle cx="227" cy="325" r="5" fill="#c8f135" opacity="0.9"/>

  <!-- Circuit lines - right -->
  <path d="M274 200 L312 200 L312 185" fill="none" stroke="#c8f135" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <circle cx="312" cy="183" r="5" fill="#c8f135" opacity="0.9"/>
  
  <path d="M274 230 L322 230 L322 245 L337 245" fill="none" stroke="#c8f135" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
